openapi: 3.1.0
info:
  title: Veritas NetBackup REST API
  description: >-
    The Veritas NetBackup REST API provides programmatic access to NetBackup
    operations including backup job management, policy configuration, client
    administration, and backup image catalog queries. The API uses JSON-based
    request and response payloads, JWT-based authentication, and follows RESTful
    conventions. All endpoints require authentication via a JSON Web Token
    obtained from the /login endpoint on the NetBackup primary server.
  version: '10.3'
  contact:
    name: Veritas NetBackup Support
    url: https://www.veritas.com/support/en_US/netbackup
  termsOfService: https://www.veritas.com/company/legal/legal-terms-of-use
  license:
    name: Proprietary
    url: https://www.veritas.com/company/legal/legal-terms-of-use
externalDocs:
  description: NetBackup REST API Getting Started Guide
  url: https://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started/
servers:
  - url: https://{primaryServer}:1556/netbackup
    description: NetBackup Primary Server REST API
    variables:
      primaryServer:
        description: Hostname or IP address of the NetBackup primary server
        default: netbackup-primary-server
tags:
  - name: Jobs
    description: >-
      Manage and monitor backup, restore, and administrative jobs. Retrieve job
      details, list jobs by filter criteria, cancel, restart, suspend, and
      resume jobs, and access job file lists and try logs.
  - name: Policies
    description: >-
      Create, retrieve, update, and delete backup policies. Manage policy
      schedules, client lists, and backup selections that define what data gets
      backed up, when, and how.
  - name: Clients
    description: >-
      Manage NetBackup clients including listing registered clients, retrieving
      client configuration details, and managing client-server trust
      relationships.
  - name: Images
    description: >-
      Query the NetBackup image catalog to retrieve backup image metadata,
      search for images by policy or client, and manage image lifecycle
      operations such as expiration and duplication.
  - name: Login
    description: >-
      Authenticate to the NetBackup REST API and obtain a JSON Web Token for
      subsequent API requests.
security:
  - jwtAuth: []
paths:
  /login:
    post:
      operationId: login
      summary: Veritas NetBackup Authenticate and obtain a JWT
      description: >-
        Authenticates a user against the NetBackup primary server and returns a
        JSON Web Token (JWT) used to authorize subsequent API calls. The token
        must be included in the Authorization header as a Bearer token for all
        other API requests.
      tags:
        - Login
      security: []
      requestBody:
        required: true
        content:
          application/vnd.netbackup+json;version=1.0:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Authentication successful, JWT returned
          content:
            application/vnd.netbackup+json;version=1.0:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request body
          content:
            application/vnd.netbackup+json;version=1.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication failed - invalid credentials
          content:
            application/vnd.netbackup+json;version=1.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs:
    get:
      operationId: listJobs
      summary: Veritas NetBackup List backup jobs
      description: >-
        Returns a list of NetBackup jobs matching the specified filter criteria.
        Jobs represent backup, restore, duplication, and other administrative
        operations. Results can be filtered by job type, state, policy name,
        client name, and time range. Supports pagination via page[limit] and
        page[offset] parameters.
      tags:
        - Jobs
      parameters:
        - name: page[limit]
          in: query
          description: Maximum number of jobs to return per page
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
        - name: page[offset]
          in: query
          description: Number of jobs to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: filter
          in: query
          description: >-
            OData-style filter expression to narrow results. Supported fields
            include jobType, state, policyName, clientName, status, and
            startTime. Example: jobType eq 'BACKUP' and state eq 'DONE'
          schema:
            type: string
        - name: sort
          in: query
          description: >-
            Comma-separated list of fields to sort by. Prefix with a hyphen
            for descending order. Example: -startTime,jobId
          schema:
            type: string
      responses:
        '200':
          description: List of jobs matching filter criteria
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/JobListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}:
    get:
      operationId: getJob
      summary: Veritas NetBackup Get job details
      description: >-
        Retrieves detailed information about a specific NetBackup job
        identified by its job ID. Returns job metadata including type, state,
        policy name, client name, schedule, start and end times, kilobytes
        transferred, and number of files.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job
          schema:
            type: string
      responses:
        '200':
          description: Job details returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/JobResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteJob
      summary: Veritas NetBackup Delete a job
      description: >-
        Deletes a completed or failed job from the NetBackup activity monitor.
        Only jobs that are in a terminal state (DONE or STOPPED) can be deleted.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job to delete
          schema:
            type: string
      responses:
        '204':
          description: Job deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - job is still active and cannot be deleted
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      summary: Veritas NetBackup Cancel a running job
      description: >-
        Cancels a currently active job. The job must be in a QUEUED or ACTIVE
        state. Once cancelled, the job state changes to STOPPED.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job to cancel
          schema:
            type: string
      responses:
        '204':
          description: Job cancellation initiated successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - job is not in a cancellable state
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/suspend:
    post:
      operationId: suspendJob
      summary: Veritas NetBackup Suspend a running job
      description: >-
        Suspends an active job, pausing its execution. The job can later be
        resumed using the resume endpoint.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job to suspend
          schema:
            type: string
      responses:
        '204':
          description: Job suspended successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - job is not in a suspendable state
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/resume:
    post:
      operationId: resumeJob
      summary: Veritas NetBackup Resume a suspended job
      description: >-
        Resumes a previously suspended job, allowing it to continue execution
        from where it was paused.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job to resume
          schema:
            type: string
      responses:
        '204':
          description: Job resumed successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - job is not in a suspended state
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/restart:
    post:
      operationId: restartJob
      summary: Veritas NetBackup Restart a failed job
      description: >-
        Restarts a job that has completed with a failed or partially successful
        status. A new job is created to retry the operation.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job to restart
          schema:
            type: string
      responses:
        '201':
          description: Job restarted successfully, new job created
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/JobResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/file-lists:
    get:
      operationId: getJobFileList
      summary: Veritas NetBackup Get the file list for a job
      description: >-
        Returns the list of files that were processed by a specific backup or
        restore job. This is useful for verifying which files were included in
        a backup operation.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job
          schema:
            type: string
        - name: page[limit]
          in: query
          description: Maximum number of file entries to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
        - name: page[offset]
          in: query
          description: Number of entries to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: File list returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/JobFileListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/jobs/{jobId}/try-logs:
    get:
      operationId: getJobTryLogs
      summary: Veritas NetBackup Get try logs for a job
      description: >-
        Returns the try log entries for a specific job, providing detailed
        information about each attempt to execute the job including status
        messages, error codes, and timing information.
      tags:
        - Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the job
          schema:
            type: string
      responses:
        '200':
          description: Try logs returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/JobTryLogResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/policies:
    get:
      operationId: listPolicies
      summary: Veritas NetBackup List backup policies
      description: >-
        Returns a list of NetBackup backup policies. Policies define which
        clients, schedules, and backup selections are used to perform backups.
        Results can be filtered by policy name and type.
      tags:
        - Policies
      parameters:
        - name: page[limit]
          in: query
          description: Maximum number of policies to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
        - name: page[offset]
          in: query
          description: Number of policies to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: filter
          in: query
          description: >-
            OData-style filter expression. Supported fields include policyName
            and policyType. Example: policyName eq 'my-policy'
          schema:
            type: string
      responses:
        '200':
          description: List of policies returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createPolicy
      summary: Veritas NetBackup Create a backup policy
      description: >-
        Creates a new NetBackup backup policy with the specified configuration
        including policy type, attributes, clients, schedules, and backup
        selections. The policy name must be unique within the NetBackup domain.
      tags:
        - Policies
      requestBody:
        required: true
        content:
          application/vnd.netbackup+json;version=4.0:
            schema:
              $ref: '#/components/schemas/PolicyCreateRequest'
      responses:
        '201':
          description: Policy created successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyResource'
        '400':
          description: Invalid policy configuration
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - policy with same name already exists
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/policies/{policyName}:
    get:
      operationId: getPolicy
      summary: Veritas NetBackup Get a backup policy
      description: >-
        Retrieves the complete configuration of a specific backup policy
        including its attributes, client list, schedules, and backup selections.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Policy details returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updatePolicy
      summary: Veritas NetBackup Update a backup policy
      description: >-
        Updates the configuration of an existing backup policy. The entire
        policy configuration must be provided in the request body. Use this
        to modify policy attributes, schedules, clients, or backup selections.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy to update
          schema:
            type: string
        - name: If-Match
          in: header
          description: >-
            ETag value for optimistic concurrency control. Must match the
            current ETag of the policy resource.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.netbackup+json;version=4.0:
            schema:
              $ref: '#/components/schemas/PolicyCreateRequest'
      responses:
        '204':
          description: Policy updated successfully
        '400':
          description: Invalid policy configuration
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Precondition failed - ETag mismatch
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deletePolicy
      summary: Veritas NetBackup Delete a backup policy
      description: >-
        Deletes an existing backup policy from the NetBackup configuration.
        Any scheduled backups associated with this policy will no longer run.
        Existing backup images created by this policy are not affected.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy to delete
          schema:
            type: string
      responses:
        '204':
          description: Policy deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/policies/{policyName}/clients:
    get:
      operationId: listPolicyClients
      summary: Veritas NetBackup List clients in a policy
      description: >-
        Returns the list of clients associated with a specific backup policy.
        Clients are the machines whose data is backed up according to the
        policy configuration.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
      responses:
        '200':
          description: Client list returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyClientListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updatePolicyClients
      summary: Veritas NetBackup Update clients in a policy
      description: >-
        Replaces the client list for a specific backup policy with the
        provided set of clients.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.netbackup+json;version=4.0:
            schema:
              $ref: '#/components/schemas/PolicyClientListRequest'
      responses:
        '204':
          description: Policy clients updated successfully
        '400':
          description: Invalid client configuration
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/policies/{policyName}/schedules:
    get:
      operationId: listPolicySchedules
      summary: Veritas NetBackup List schedules in a policy
      description: >-
        Returns all schedules configured for a specific backup policy. Schedules
        define when and how frequently backups are performed.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
      responses:
        '200':
          description: Schedule list returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyScheduleListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/policies/{policyName}/schedules/{scheduleName}:
    get:
      operationId: getPolicySchedule
      summary: Veritas NetBackup Get a specific policy schedule
      description: >-
        Retrieves the configuration of a specific schedule within a backup
        policy including its type, frequency, retention level, and storage
        unit settings.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
        - name: scheduleName
          in: path
          required: true
          description: The name of the schedule
          schema:
            type: string
      responses:
        '200':
          description: Schedule details returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyScheduleResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy or schedule not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updatePolicySchedule
      summary: Veritas NetBackup Create or update a policy schedule
      description: >-
        Creates or updates a schedule within a backup policy. If the schedule
        already exists it is replaced with the provided configuration.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
        - name: scheduleName
          in: path
          required: true
          description: The name of the schedule to create or update
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.netbackup+json;version=4.0:
            schema:
              $ref: '#/components/schemas/PolicyScheduleRequest'
      responses:
        '201':
          description: Schedule created successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/PolicyScheduleResource'
        '204':
          description: Schedule updated successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deletePolicySchedule
      summary: Veritas NetBackup Delete a policy schedule
      description: >-
        Removes a schedule from a backup policy. Existing backups created
        by this schedule are not affected.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          required: true
          description: The name of the policy
          schema:
            type: string
        - name: scheduleName
          in: path
          required: true
          description: The name of the schedule to delete
          schema:
            type: string
      responses:
        '204':
          description: Schedule deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy or schedule not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/hosts:
    get:
      operationId: listClients
      summary: Veritas NetBackup List NetBackup clients
      description: >-
        Returns a list of hosts registered with the NetBackup primary server,
        including backup clients, media servers, and other host types.
        Results can be filtered by host name and host type.
      tags:
        - Clients
      parameters:
        - name: page[limit]
          in: query
          description: Maximum number of clients to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
        - name: page[offset]
          in: query
          description: Number of entries to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: filter
          in: query
          description: >-
            OData-style filter expression. Supported fields include hostName
            and hostType. Example: hostType eq 'CLIENT'
          schema:
            type: string
      responses:
        '200':
          description: List of clients returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ClientListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/hosts/{hostId}:
    get:
      operationId: getClient
      summary: Veritas NetBackup Get client details
      description: >-
        Retrieves detailed configuration and status information for a specific
        NetBackup host including operating system details, hardware platform,
        and connectivity status.
      tags:
        - Clients
      parameters:
        - name: hostId
          in: path
          required: true
          description: The unique identifier or hostname of the client
          schema:
            type: string
      responses:
        '200':
          description: Client details returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ClientResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Client not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/images:
    get:
      operationId: listImages
      summary: Veritas NetBackup List backup images
      description: >-
        Returns a list of backup images in the NetBackup catalog. Images
        represent completed backup operations and contain metadata about
        the backup including policy, client, schedule, backup time, size,
        and expiration. Results can be filtered by policy name, client name,
        and backup time range.
      tags:
        - Images
      parameters:
        - name: page[limit]
          in: query
          description: Maximum number of images to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 1000
        - name: page[offset]
          in: query
          description: Number of images to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: filter
          in: query
          description: >-
            OData-style filter expression. Supported fields include policyName,
            clientName, scheduleName, backupId, and backupTime. Example:
            policyName eq 'daily-backup' and clientName eq 'server1'
          schema:
            type: string
        - name: sort
          in: query
          description: >-
            Comma-separated list of fields to sort by. Prefix with a hyphen
            for descending order. Example: -backupTime
          schema:
            type: string
      responses:
        '200':
          description: List of images returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/images/{backupId}:
    get:
      operationId: getImage
      summary: Veritas NetBackup Get backup image details
      description: >-
        Retrieves detailed metadata for a specific backup image including the
        backup ID, policy and client that created it, schedule used, backup and
        expiration times, kilobytes of data, number of files, and storage
        location.
      tags:
        - Images
      parameters:
        - name: backupId
          in: path
          required: true
          description: The unique backup ID of the image
          schema:
            type: string
      responses:
        '200':
          description: Image details returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ImageResource'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Image not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: expireImage
      summary: Veritas NetBackup Expire a backup image
      description: >-
        Expires a backup image by setting its expiration date to the current
        time. The image will be removed from the catalog and its associated
        media will become available for reuse during the next image cleanup
        cycle.
      tags:
        - Images
      parameters:
        - name: backupId
          in: path
          required: true
          description: The unique backup ID of the image to expire
          schema:
            type: string
      responses:
        '204':
          description: Image expired successfully
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Image not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/images/{backupId}/contents:
    get:
      operationId: getImageContents
      summary: Veritas NetBackup Get backup image file contents
      description: >-
        Returns the file and directory listing contained within a specific
        backup image. Useful for browsing what data was captured in a backup
        before initiating a restore.
      tags:
        - Images
      parameters:
        - name: backupId
          in: path
          required: true
          description: The unique backup ID of the image
          schema:
            type: string
        - name: page[limit]
          in: query
          description: Maximum number of content entries to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
        - name: page[offset]
          in: query
          description: Number of entries to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: path
          in: query
          description: >-
            Directory path to list contents from within the backup image.
            Defaults to the root of the backup selection.
          schema:
            type: string
      responses:
        '200':
          description: Image contents returned successfully
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ImageContentsResponse'
        '401':
          description: Unauthorized - missing or invalid JWT
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Image not found
          content:
            application/vnd.netbackup+json;version=4.0:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JSON Web Token obtained from the /login endpoint. Include in
        the Authorization header as: Bearer <token>
  schemas:
    LoginRequest:
      type: object
      required:
        - domainName
        - domainType
        - userName
        - password
      properties:
        domainName:
          type: string
          description: The authentication domain name (e.g., the NetBackup primary server hostname)
        domainType:
          type: string
          description: The type of authentication domain
          enum:
            - unixpwd
            - nt
            - ldap
            - vx
        userName:
          type: string
          description: The user account name
        password:
          type: string
          description: The user account password
          format: password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JSON Web Token for authenticating subsequent API requests
        tokenType:
          type: string
          description: The token type
          enum:
            - BEARER
        validity:
          type: integer
          description: Token validity period in seconds
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: integer
          description: Numeric error code
        errorMessage:
          type: string
          description: Human-readable error description
        details:
          type: array
          description: Additional error details
          items:
            type: object
            properties:
              errorCode:
                type: integer
                description: Detailed error code
              errorMessage:
                type: string
                description: Detailed error message
    PaginationMeta:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page[limit]:
              type: integer
              description: The maximum number of items per page
            page[offset]:
              type: integer
              description: The current offset
            count:
              type: integer
              description: Total number of items matching the query
            last:
              type: integer
              description: Offset of the last page
    JobAttributes:
      type: object
      description: Attributes of a NetBackup job
      properties:
        jobId:
          type: integer
          description: Unique identifier for the job
        parentJobId:
          type: integer
          description: Identifier of the parent job, if this is a child job
        jobType:
          type: string
          description: The type of job
          enum:
            - BACKUP
            - RESTORE
            - DUPLICATE
            - IMPORT
            - VAULT
            - DBBACKUP
            - LABEL
            - ERASE
            - VERIFY
            - INVENTORY
        state:
          type: string
          description: Current state of the job
          enum:
            - QUEUED
            - ACTIVE
            - RE_QUEUED
            - DONE
            - SUSPENDED
            - INCOMPLETE
            - WAITING_FOR_RETRY
        status:
          type: integer
          description: Exit status code of the job. A value of 0 indicates success.
        policyName:
          type: string
          description: Name of the policy associated with the job
        policyType:
          type: string
          description: Type of the policy (e.g., Standard, VMware, Oracle)
        scheduleName:
          type: string
          description: Name of the schedule that triggered the job
        scheduleType:
          type: string
          description: Type of the schedule
          enum:
            - FULL
            - INCR
            - DIFF_INCR
            - CINC
            - USER_BACKUP
            - USER_ARCHIVE
        clientName:
          type: string
          description: Hostname of the client being backed up or restored
        mediaServer:
          type: string
          description: Hostname of the media server processing the job
        storageUnit:
          type: string
          description: Name of the storage unit used by the job
        startTime:
          type: string
          format: date-time
          description: Timestamp when the job started
        endTime:
          type: string
          format: date-time
          description: Timestamp when the job completed or was last updated
        elapsedTime:
          type: integer
          description: Total elapsed time in seconds
        kilobytesTransferred:
          type: integer
          description: Total kilobytes of data transferred
        filesTransferred:
          type: integer
          description: Total number of files processed
        percentComplete:
          type: integer
          description: Completion percentage (0-100)
          minimum: 0
          maximum: 100
        currentOperation:
          type: string
          description: Description of the operation currently being performed
        attempt:
          type: integer
          description: Current attempt number for the job
        restartable:
          type: boolean
          description: Whether the job can be restarted
        suspendable:
          type: boolean
          description: Whether the job can be suspended
        resumable:
          type: boolean
          description: Whether the job can be resumed
        cancellable:
          type: boolean
          description: Whether the job can be cancelled
    JobResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: job
            id:
              type: string
              description: The job ID
            attributes:
              $ref: '#/components/schemas/JobAttributes'
            links:
              type: object
              properties:
                self:
                  type: object
                  properties:
                    href:
                      type: string
                      format: uri
                      description: Link to this job resource
    JobListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: job
              id:
                type: string
              attributes:
                $ref: '#/components/schemas/JobAttributes'
              links:
                type: object
                properties:
                  self:
                    type: object
                    properties:
                      href:
                        type: string
                        format: uri
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    JobFileListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: jobFileEntry
              id:
                type: string
              attributes:
                type: object
                properties:
                  fileName:
                    type: string
                    description: Full path of the file
                  fileSize:
                    type: integer
                    description: Size of the file in bytes
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    JobTryLogResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: jobTryLogEntry
              id:
                type: string
              attributes:
                type: object
                properties:
                  tryNumber:
                    type: integer
                    description: Attempt number
                  pid:
                    type: integer
                    description: Process ID
                  statusCode:
                    type: integer
                    description: Status code for this attempt
                  statusMessage:
                    type: string
                    description: Human-readable status message
                  startTime:
                    type: string
                    format: date-time
                    description: When this attempt started
                  endTime:
                    type: string
                    format: date-time
                    description: When this attempt ended
                  mediaServer:
                    type: string
                    description: Media server used for this attempt
                  storageUnit:
                    type: string
                    description: Storage unit used for this attempt
                  kilobytesTransferred:
                    type: integer
                    description: Data transferred in this attempt
                  filesTransferred:
                    type: integer
                    description: Files processed in this attempt
    PolicyAttributes:
      type: object
      description: Attributes of a NetBackup backup policy
      properties:
        policyName:
          type: string
          description: Unique name of the policy
        policyType:
          type: string
          description: The policy type defining the type of backup
          enum:
            - Standard
            - MS-Windows
            - VMware
            - Oracle
            - MS-SQL-Server
            - MS-Exchange-Server
            - Hyper-V
            - Kubernetes
            - BigData
            - CloudObject
            - NAS-Data-Protection
            - Universal-Share
        active:
          type: boolean
          description: Whether the policy is currently active
        effectiveDate:
          type: string
          format: date-time
          description: Date and time the policy becomes effective
        snapshotMethodArgs:
          type: string
          description: Arguments for snapshot method if applicable
        backupCopies:
          type: object
          properties:
            copies:
              type: array
              items:
                type: object
                properties:
                  copyNumber:
                    type: integer
                    description: Copy number (1 for primary, 2+ for copies)
                  storageUnit:
                    type: string
                    description: Storage unit name for this copy
                  retentionPeriod:
                    type: object
                    properties:
                      value:
                        type: integer
                        description: Retention period value
                      unit:
                        type: string
                        description: Time unit for retention
                        enum:
                          - DAYS
                          - WEEKS
                          - MONTHS
                          - YEARS
                          - INFINITE
        priority:
          type: integer
          description: Job priority for this policy
          minimum: 0
          maximum: 99999
        keyword:
          type: string
          description: Keyword tag for the policy
        dataClassification:
          type: string
          description: Data classification associated with this policy
    PolicyCreateRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            type:
              type: string
              const: policy
            id:
              type: string
              description: Policy name (must be unique)
            attributes:
              type: object
              required:
                - policy
              properties:
                policy:
                  type: object
                  required:
                    - policyName
                    - policyType
                  properties:
                    policyName:
                      type: string
                      description: Unique policy name
                    policyType:
                      type: string
                      description: Type of the policy
                    policyAttributes:
                      $ref: '#/components/schemas/PolicyAttributes'
                    clients:
                      type: array
                      items:
                        $ref: '#/components/schemas/PolicyClient'
                    schedules:
                      type: array
                      items:
                        $ref: '#/components/schemas/PolicySchedule'
                    backupSelections:
                      type: object
                      properties:
                        selections:
                          type: array
                          items:
                            type: string
                            description: File paths or directives to back up
    PolicyResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: policy
            id:
              type: string
              description: Policy name
            attributes:
              type: object
              properties:
                policy:
                  type: object
                  properties:
                    policyName:
                      type: string
                    policyType:
                      type: string
                    policyAttributes:
                      $ref: '#/components/schemas/PolicyAttributes'
                    clients:
                      type: array
                      items:
                        $ref: '#/components/schemas/PolicyClient'
                    schedules:
                      type: array
                      items:
                        $ref: '#/components/schemas/PolicySchedule'
                    backupSelections:
                      type: object
                      properties:
                        selections:
                          type: array
                          items:
                            type: string
            links:
              type: object
              properties:
                self:
                  type: object
                  properties:
                    href:
                      type: string
                      format: uri
    PolicyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: policy
              id:
                type: string
              attributes:
                type: object
                properties:
                  policy:
                    type: object
                    properties:
                      policyName:
                        type: string
                      policyType:
                        type: string
                      policyAttributes:
                        $ref: '#/components/schemas/PolicyAttributes'
              links:
                type: object
                properties:
                  self:
                    type: object
                    properties:
                      href:
                        type: string
                        format: uri
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PolicyClient:
      type: object
      properties:
        clientName:
          type: string
          description: Hostname of the client
        hardware:
          type: string
          description: Hardware type of the client
        operatingSystem:
          type: string
          description: Operating system of the client
        priority:
          type: integer
          description: Client priority within the policy
    PolicyClientListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: policyClient
              id:
                type: string
              attributes:
                $ref: '#/components/schemas/PolicyClient'
    PolicyClientListRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              const: policyClientList
            attributes:
              type: object
              required:
                - clients
              properties:
                clients:
                  type: array
                  items:
                    $ref: '#/components/schemas/PolicyClient'
    PolicySchedule:
      type: object
      properties:
        scheduleName:
          type: string
          description: Name of the schedule
        scheduleType:
          type: string
          description: Type of backup for this schedule
          enum:
            - FULL
            - INCR
            - DIFF_INCR
            - CINC
            - USER_BACKUP
            - USER_ARCHIVE
        frequency:
          type: integer
          description: Frequency in seconds between backup runs
        retentionPeriod:
          type: object
          properties:
            value:
              type: integer
              description: Retention period value
            unit:
              type: string
              description: Time unit for retention
              enum:
                - DAYS
                - WEEKS
                - MONTHS
                - YEARS
                - INFINITE
        storageUnit:
          type: string
          description: Name of the storage unit for this schedule
        backupWindow:
          type: object
          properties:
            startSeconds:
              type: integer
              description: Start of the backup window in seconds from midnight
            durationSeconds:
              type: integer
              description: Duration of the backup window in seconds
            dayOfWeek:
              type: integer
              description: Day of the week (0=Sunday through 6=Saturday)
        mediaMultiplexing:
          type: integer
          description: Maximum number of concurrent backup streams to a single device
        syntheticBackup:
          type: boolean
          description: Whether this schedule creates synthetic backups
    PolicyScheduleResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: policySchedule
            id:
              type: string
              description: Schedule name
            attributes:
              $ref: '#/components/schemas/PolicySchedule'
    PolicyScheduleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: policySchedule
              id:
                type: string
              attributes:
                $ref: '#/components/schemas/PolicySchedule'
    PolicyScheduleRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            type:
              type: string
              const: policySchedule
            id:
              type: string
              description: Schedule name
            attributes:
              $ref: '#/components/schemas/PolicySchedule'
    ClientAttributes:
      type: object
      description: Attributes of a NetBackup client host
      properties:
        hostName:
          type: string
          description: Fully qualified hostname of the client
        hostType:
          type: string
          description: Type of host in the NetBackup environment
          enum:
            - CLIENT
            - MASTER
            - MEDIA
        os:
          type: string
          description: Operating system of the client
        platform:
          type: string
          description: Hardware platform of the client
        version:
          type: string
          description: NetBackup client software version
        fingerprintSha256:
          type: string
          description: SHA-256 fingerprint of the client certificate
        trustLevel:
          type: string
          description: Trust level established with the primary server
          enum:
            - UNKNOWN
            - AUTHENTICATED
            - TRUSTED
        communicationStatus:
          type: string
          description: Current communication status
          enum:
            - ONLINE
            - OFFLINE
            - UNREACHABLE
        lastConnectedTime:
          type: string
          format: date-time
          description: Timestamp of the last successful communication
    ClientResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: host
            id:
              type: string
              description: The host identifier
            attributes:
              $ref: '#/components/schemas/ClientAttributes'
            links:
              type: object
              properties:
                self:
                  type: object
                  properties:
                    href:
                      type: string
                      format: uri
    ClientListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: host
              id:
                type: string
              attributes:
                $ref: '#/components/schemas/ClientAttributes'
              links:
                type: object
                properties:
                  self:
                    type: object
                    properties:
                      href:
                        type: string
                        format: uri
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ImageAttributes:
      type: object
      description: Attributes of a NetBackup backup image
      properties:
        backupId:
          type: string
          description: Unique identifier for the backup image
        policyName:
          type: string
          description: Name of the policy that created this image
        policyType:
          type: string
          description: Type of the policy
        clientName:
          type: string
          description: Client hostname that was backed up
        scheduleName:
          type: string
          description: Schedule name that triggered the backup
        scheduleType:
          type: string
          description: Type of the schedule
          enum:
            - FULL
            - INCR
            - DIFF_INCR
            - CINC
            - USER_BACKUP
            - USER_ARCHIVE
        backupTime:
          type: string
          format: date-time
          description: Timestamp when the backup was performed
        expirationTime:
          type: string
          format: date-time
          description: Timestamp when the image will expire
        kilobytes:
          type: integer
          description: Total size of the backup image in kilobytes
        numberOfFiles:
          type: integer
          description: Total number of files in the backup image
        primaryCopy:
          type: integer
          description: Primary copy number for the image
        copyCount:
          type: integer
          description: Total number of copies of this image
        mediaServer:
          type: string
          description: Media server that performed the backup
        storageUnit:
          type: string
          description: Storage unit where the image is stored
        mediaId:
          type: string
          description: Media ID where the image resides
        compressed:
          type: boolean
          description: Whether the image data is compressed
        encrypted:
          type: boolean
          description: Whether the image data is encrypted
        multiplexed:
          type: boolean
          description: Whether the image is multiplexed
        retentionLevel:
          type: integer
          description: Retention level assigned to the image
          minimum: 0
          maximum: 24
    ImageResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: backupImage
            id:
              type: string
              description: The backup ID
            attributes:
              $ref: '#/components/schemas/ImageAttributes'
            links:
              type: object
              properties:
                self:
                  type: object
                  properties:
                    href:
                      type: string
                      format: uri
    ImageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: backupImage
              id:
                type: string
              attributes:
                $ref: '#/components/schemas/ImageAttributes'
              links:
                type: object
                properties:
                  self:
                    type: object
                    properties:
                      href:
                        type: string
                        format: uri
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ImageContentsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: imageContent
              id:
                type: string
              attributes:
                type: object
                properties:
