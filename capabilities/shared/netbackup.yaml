naftiko: "1.0.0-alpha1"

info:
  label: "Veritas NetBackup REST API"
  description: "NetBackup REST API for managing backup jobs, policies, clients, and backup image catalogs."
  tags:
    - Backup
    - Data Protection
    - Enterprise
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      NETBACKUP_HOST: NETBACKUP_HOST
      NETBACKUP_USERNAME: NETBACKUP_USERNAME
      NETBACKUP_PASSWORD: NETBACKUP_PASSWORD

capability:
  consumes:
    - type: http
      namespace: netbackup
      baseUri: https://netbackup-primary-server:1556/netbackup
      description: "Veritas NetBackup REST API for backup operations."
      authentication:
        type: bearer
        token: "{{NETBACKUP_TOKEN}}"
      resources:
        - name: login
          path: /login
          description: "Authentication endpoint."
          operations:
            - name: login
              method: POST
              description: "Authenticate and obtain a JWT token."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  domainName: "{{tools.domainName}}"
                  domainType: "{{tools.domainType}}"
                  userName: "{{tools.userName}}"
                  password: "{{tools.password}}"
        - name: jobs
          path: /admin/jobs
          description: "Backup job management."
          operations:
            - name: list-jobs
              method: GET
              description: "List all backup jobs with optional filters."
              inputParameters:
                - name: page[limit]
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of jobs to return."
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job
              method: GET
              description: "Get details for a specific job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-job
              method: DELETE
              description: "Delete a job record."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-job
              method: POST
              description: "Cancel a running job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspend-job
              method: POST
              description: "Suspend a running job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resume-job
              method: POST
              description: "Resume a suspended job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restart-job
              method: POST
              description: "Restart a failed or completed job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job-file-list
              method: GET
              description: "Get file list for a job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job-try-logs
              method: GET
              description: "Get try logs for a job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: policies
          path: /config/policies
          description: "Backup policy management."
          operations:
            - name: list-policies
              method: GET
              description: "List all backup policies."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-policy
              method: POST
              description: "Create a new backup policy."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data: "{{tools.data}}"
            - name: get-policy
              method: GET
              description: "Get a specific backup policy."
              inputParameters:
                - name: policyName
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-policy
              method: PUT
              description: "Update a backup policy."
              inputParameters:
                - name: policyName
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data: "{{tools.data}}"
            - name: delete-policy
              method: DELETE
              description: "Delete a backup policy."
              inputParameters:
                - name: policyName
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: clients
          path: /config/hosts
          description: "NetBackup client management."
          operations:
            - name: list-clients
              method: GET
              description: "List all NetBackup clients."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-client
              method: GET
              description: "Get details for a specific client."
              inputParameters:
                - name: hostId
                  in: path
                  type: string
                  required: true
                  description: "Host identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: images
          path: /catalog/images
          description: "Backup image catalog."
          operations:
            - name: list-images
              method: GET
              description: "List backup images in the catalog."
              inputParameters:
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-image
              method: GET
              description: "Get details for a specific backup image."
              inputParameters:
                - name: backupId
                  in: path
                  type: string
                  required: true
                  description: "Backup image identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: expire-image
              method: POST
              description: "Expire a backup image."
              inputParameters:
                - name: backupId
                  in: path
                  type: string
                  required: true
                  description: "Backup image identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-image-contents
              method: GET
              description: "Get file contents of a backup image."
              inputParameters:
                - name: backupId
                  in: path
                  type: string
                  required: true
                  description: "Backup image identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: netbackup-api
      resources:
        - path: /v1/jobs
          name: jobs
          description: "Backup job operations."
          operations:
            - method: GET
              name: list-jobs
              description: "List all backup jobs."
              call: "netbackup.list-jobs"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: netbackup-mcp
      transport: http
      tools:
        - name: login
          description: "Authenticate to NetBackup and obtain a JWT token."
          hints:
            readOnly: false
          call: "netbackup.login"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: "List all backup jobs with optional filters."
          hints:
            readOnly: true
          call: "netbackup.list-jobs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job
          description: "Get details for a specific backup job."
          hints:
            readOnly: true
          call: "netbackup.get-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-job
          description: "Cancel a running backup job."
          hints:
            destructive: true
          call: "netbackup.cancel-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: suspend-job
          description: "Suspend a running backup job."
          hints:
            readOnly: false
          call: "netbackup.suspend-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: resume-job
          description: "Resume a suspended backup job."
          hints:
            readOnly: false
          call: "netbackup.resume-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: restart-job
          description: "Restart a failed or completed backup job."
          hints:
            readOnly: false
          call: "netbackup.restart-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job-file-list
          description: "Get file list for a backup job."
          hints:
            readOnly: true
          call: "netbackup.get-job-file-list"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job-try-logs
          description: "Get try logs for a backup job."
          hints:
            readOnly: true
          call: "netbackup.get-job-try-logs"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-policies
          description: "List all backup policies."
          hints:
            readOnly: true
          call: "netbackup.list-policies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-policy
          description: "Get a specific backup policy."
          hints:
            readOnly: true
          call: "netbackup.get-policy"
          with:
            policyName: "tools.policyName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-policy
          description: "Create a new backup policy."
          hints:
            readOnly: false
          call: "netbackup.create-policy"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-policy
          description: "Update a backup policy."
          hints:
            readOnly: false
            idempotent: true
          call: "netbackup.update-policy"
          with:
            policyName: "tools.policyName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-policy
          description: "Delete a backup policy."
          hints:
            destructive: true
          call: "netbackup.delete-policy"
          with:
            policyName: "tools.policyName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-clients
          description: "List all NetBackup clients."
          hints:
            readOnly: true
          call: "netbackup.list-clients"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-client
          description: "Get details for a specific client."
          hints:
            readOnly: true
          call: "netbackup.get-client"
          with:
            hostId: "tools.hostId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-images
          description: "List backup images in the catalog."
          hints:
            readOnly: true
          call: "netbackup.list-images"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-image
          description: "Get details for a specific backup image."
          hints:
            readOnly: true
          call: "netbackup.get-image"
          with:
            backupId: "tools.backupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: expire-image
          description: "Expire a backup image."
          hints:
            destructive: true
          call: "netbackup.expire-image"
          with:
            backupId: "tools.backupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-image-contents
          description: "Get file contents of a backup image."
          hints:
            readOnly: true
          call: "netbackup.get-image-contents"
          with:
            backupId: "tools.backupId"
          outputParameters:
            - type: object
              mapping: "$."
